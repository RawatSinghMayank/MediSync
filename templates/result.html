<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result</title>
  <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}"></link>
 <style>
   .result-grid {
     align-items:center;
     text-align:center;
     margin-left:25px;
     margin-right:25px;
     display: grid;
     grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
     grid-gap: 30px;
   }

   .result {
     box-shadow: rgba(45, 45, 69, 0.1) 0px 4px 16px, rgba(17, 17, 26, 0.1) 0px 8px 24px, rgba(17, 17, 26, 0.1) 0px 16px 56px;
     border: 1px solid #ddd;
     border-radius: 5px;
     overflow: hidden;
     transition: all 0.3s ease-in-out;
     padding: 15px;
   }
   .result:hover{
     box-shadow: rgba(17, 17, 26, 0.2) 0px 4px 16px, rgba(17, 17, 26, 0.2) 0px 8px 24px, rgba(17, 17, 26, 0.2) 0px 16px 56px;
   }


   .result img {
     margin-top:20px;
     width: 100%;
     height: auto;
     object-fit: cover;
   }

   .result h3 {
     font-size: 24px;
     margin: 20px;
   }

   .result p {
     font-size: 16px;
     margin: 0 20px 20px 20px;
   }

   .btn {
     display: inline-block;
     margin-bottom:15px;
     padding: 10px 20px;
     background-color: #007bff;
     color: #fff;
     border: none;
     border-radius: 5px;
     font-size: 16px;
     text-align: center;
     text-decoration: none;
     transition: all 0.3s ease-in-out;
   }

   .btn:hover {
     background-color: #0056b3;
   }

   @media screen and (max-width: 768px) {
     .result-grid {
       display: grid;
       grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
       grid-gap: 30px;
       margin-top: 50px;
     }

     .result-card {
       position: relative;
       overflow: hidden;
       border-radius: 10px;
       box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
     }

     .result-card:hover .result-img img {
       transform: scale(1.1);
     }

     .result-img {
       position: relative;
       overflow: hidden;
       height: 200px;
       border-top-left-radius: 10px;
       border-top-right-radius: 10px;
     }

     .result-img img {
       width: 100%;
       height: 100%;
       object-fit: cover;
       transition: transform 0.3s ease-in-out;
     }

     .result-content {
       padding: 20px;
     }

     .result-title {
       font-size: 24px;
       font-weight: bold;
       margin-bottom: 10px;
     }

     .result-location {
       font-size: 16px;
       margin-bottom: 10px;
     }

     .result-desc {
       font-size: 14px;
       line-height: 1.5;
       margin-bottom: 20px;
     }

     .result-link {
       display: inline-block;
       padding: 10px 20px;
       background-color: #333;
       color: #fff;
       border-radius: 5px;
       text-decoration: none;
       transition: background-color 0.3s ease-in-out;
     }

     .result-link:hover {
       background-color: #555;
     }

     }

 </style>
</head>
<body>
  <div class="result-grid">
  <div  data-aos="fade-up" class="result">
    <!-- <img src="{{ filepath }}" alt="result Image"> -->
    <h3>Disease Classification</h3>
    <p>{{cow_classification}}</p>
    <p>{{human_classification}}</p>
    <p>{{covid_classification}}</p>
    <a href="#" class="btn btn-primary">Treatment</a>
  </div>
  </div>
  
</body>
</html>
